<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Gunting Batu Kertas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 20px;
        }

        .score-section {
            flex: 1;
            background: #f0f0f0;
            padding: 20px;
            border-radius: 10px;
        }

        .score-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .score {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .choices {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .choice-btn {
            width: 80px;
            height: 80px;
            border: 3px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-size: 40px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .choice-btn:hover {
            border-color: #667eea;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .choice-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
            transform: scale(1.1);
        }

        .result-section {
            margin: 30px 0;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .vs-display {
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .player-choice {
            text-align: center;
        }

        .choice-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .choice-emoji {
            font-size: 60px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vs-text {
            font-size: 20px;
            color: #999;
            font-weight: bold;
        }

        .result-message {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            min-height: 35px;
        }

        .result-message.win {
            color: #27ae60;
        }

        .result-message.lose {
            color: #e74c3c;
        }

        .result-message.draw {
            color: #f39c12;
        }

        .result-detail {
            color: #666;
            font-size: 14px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .play-btn {
            background: #667eea;
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .play-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .reset-btn {
            background: #95a5a6;
            color: white;
        }

        .reset-btn:hover {
            background: #7f8c8d;
            transform: translateY(-2px);
        }

        .info {
            color: #666;
            font-size: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .choice-btn {
                width: 70px;
                height: 70px;
                font-size: 35px;
            }

            .choice-emoji {
                font-size: 50px;
                min-height: 60px;
            }

            .result-message {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Gunting Batu Kertas</h1>
        <p class="subtitle">Game Klasik Gunting Batu Kertas</p>

        <div class="score-board">
            <div class="score-section">
                <div class="score-label">Anda</div>
                <div class="score" id="playerScore">0</div>
            </div>
            <div class="score-section">
                <div class="score-label">Komputer</div>
                <div class="score" id="computerScore">0</div>
            </div>
        </div>

        <div class="choices">
            <button class="choice-btn" onclick="playGame('gunting')" title="Gunting">✌️</button>
            <button class="choice-btn" onclick="playGame('batu')" title="Batu">✊</button>
            <button class="choice-btn" onclick="playGame('kertas')" title="Kertas">✋</button>
        </div>

        <div class="result-section">
            <div class="vs-display" id="vsDisplay" style="display: none;">
                <div class="player-choice">
                    <div class="choice-label">Pilihan Anda</div>
                    <div class="choice-emoji" id="playerEmoji"></div>
                </div>
                <div class="vs-text">VS</div>
                <div class="player-choice">
                    <div class="choice-label">Pilihan Komputer</div>
                    <div class="choice-emoji" id="computerEmoji"></div>
                </div>
            </div>
            <div class="result-message" id="resultMessage"></div>
            <div class="result-detail" id="resultDetail"></div>
        </div>

        <div class="buttons">
            <button class="play-btn" onclick="playGame('gunting')">Mulai Bermain</button>
            <button class="reset-btn" onclick="resetGame()">Reset Skor</button>
        </div>

        <div class="info">
            💡 Pilih Gunting, Batu, atau Kertas untuk bermain melawan komputer
        </div>
    </div>

    <script>
        // Inisialisasi skor
        let playerScore = 0;
        let computerScore = 0;

        // Pemetaan emoji untuk setiap pilihan
        const emojiMap = {
            'gunting': '✌️',
            'batu': '✊',
            'kertas': '✋'
        };

        // Nama dalam bahasa Indonesia
        const nameMap = {
            'gunting': 'Gunting',
            'batu': 'Batu',
            'kertas': 'Kertas'
        };

        // Fungsi untuk mendapatkan pilihan komputer
        function getComputerChoice() {
            const choices = ['gunting', 'batu', 'kertas'];
            const randomIndex = Math.floor(Math.random() * choices.length);
            return choices[randomIndex];
        }

        // Fungsi untuk menentukan pemenang
        function determineWinner(player, computer) {
            if (player === computer) {
                return 'draw';
            }

            if (
                (player === 'gunting' && computer === 'kertas') ||
                (player === 'batu' && computer === 'gunting') ||
                (player === 'kertas' && computer === 'batu')
            ) {
                return 'win';
            }

            return 'lose';
        }

        // Fungsi utama untuk bermain
        function playGame(playerChoice) {
            const computerChoice = getComputerChoice();
            const result = determineWinner(playerChoice, computerChoice);

            // Tampilkan pilihan
            document.getElementById('vsDisplay').style.display = 'flex';
            document.getElementById('playerEmoji').textContent = emojiMap[playerChoice];
            document.getElementById('computerEmoji').textContent = emojiMap[computerChoice];

            // Update skor dan tampilkan hasil
            let resultMessage = '';
            let resultClass = '';

            switch (result) {
                case 'win':
                    playerScore++;
                    resultMessage = '🎉 Anda Menang!';
                    resultClass = 'win';
                    break;
                case 'lose':
                    computerScore++;
                    resultMessage = '😢 Anda Kalah!';
                    resultClass = 'lose';
                    break;
                case 'draw':
                    resultMessage = '🤝 Seri!';
                    resultClass = 'draw';
                    break;
            }

            // Tampilkan pesan hasil
            const resultElement = document.getElementById('resultMessage');
            resultElement.textContent = resultMessage;
            resultElement.className = `result-message ${resultClass}`;

            // Tampilkan detail hasil
            document.getElementById('resultDetail').textContent = 
                `${nameMap[playerChoice]} vs ${nameMap[computerChoice]}`;

            // Update skor
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
        }

        // Fungsi untuk reset skor
        function resetGame() {
            playerScore = 0;
            computerScore = 0;
            document.getElementById('playerScore').textContent = '0';
            document.getElementById('computerScore').textContent = '0';
            document.getElementById('vsDisplay').style.display = 'none';
            document.getElementById('resultMessage').textContent = '';
            document.getElementById('resultDetail').textContent = '';
        }
    </script>
</body>
</html>
